<div class="container my-4">
  <div class="row">
    <div class="col card-wrapper p-3 mx-3 mx-sm-0 rounded bg-secondary-subtle border border-dark-subtle">
      <div id="carouselExampleCaptions" class="carousel slide rounded overflow-hidden" data-bs-ride="true">
        <div class="carousel-inner">
          @for (evento of eventos; track evento.id; let f = $first) {
          <div class="carousel-item {{ f ? 'active' : '' }}">
            <img src="{{ evento.img }}" class="d-block w-100 rounded">
            <div class="carousel-caption d-none d-sm-block">
              <h5>{{ evento.title }}</h5>
              <p class="text-start text-md-center">{{ evento.desc }}</p>
            </div>
          </div>
          } @empty {
          <div class="carousel-item active">
            <svg aria-label="Placeholder: First slide" class="bd-placeholder-img bd-placeholder-img-lg d-block w-100"
              height="400" preserveAspectRatio="xMidYMid slice" role="img" width="800"
              xmlns="http://www.w3.org/2000/svg">
              <title>Placeholder</title>
              <rect width="100%" height="100%" fill="#777"></rect><text x="50%" y="50%" fill="#555" dy=".3em">First
                slide</text>
            </svg>
            <div class="carousel-caption d-none d-sm-block">
              <h5>First slide label</h5>
              <p class="text-start text-md-center">Some representative placeholder content for the first slide.</p>
            </div>
          </div>
          }
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions"
          data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions"
          data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </div>
  </div>
</div>
